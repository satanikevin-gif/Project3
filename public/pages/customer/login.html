<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MediFlow</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card card">
      <div class="auth-logo">
        <h1>MediFlow</h1>
        <p>Sign in to your account</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <p id="loginError" style="display:none;margin-bottom:12px;color:var(--red);font-size:14px"></p>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>
      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Register</a></p>
        <p class="mt-1"><a href="#" id="forgotPasswordLink">Forgot password?</a></p>
      </div>
    </div>
  </div>

  <script src="../../js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const redirectUrl = new URLSearchParams(window.location.search).get('redirect');
      const loginForm = document.getElementById('loginForm');
      const loginError = document.getElementById('loginError');
      const submitBtn = loginForm.querySelector('button[type="submit"]');

      function showError(message) {
        loginError.textContent = message;
        loginError.style.display = message ? 'block' : 'none';
      }

      function goAfterLogin(role) {
        api.goAfterLogin(role, redirectUrl);
      }

      const savedUser = api.getUser();
      if (savedUser && api.isLoggedIn()) {
        goAfterLogin(savedUser.role);
        return;
      }

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        showError('');

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
          showError('Please enter email and password.');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in...';

        try {
          const data = await api.post('/api/auth/login', { email, password });

          if (!data.accessToken || !data.user) {
            throw { message: 'Invalid response from server.' };
          }

          localStorage.setItem('mediflow_token', data.accessToken);
          localStorage.setItem('mediflow_user', JSON.stringify(data.user));
          goAfterLogin(data.user.role);
        } catch (err) {
          showError(err.message || 'Login failed. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      });

      document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
        e.preventDefault();
        const email = prompt('Enter your email:');
        if (!email) return;
        try {
          await api.post('/api/auth/forgot-password', { email: email.trim() });
          alert('OTP sent to your email.');
        } catch (err) {
          alert(err.message || 'Failed to send OTP');
        }
      });
    });
  </script>
</body>

</html>
