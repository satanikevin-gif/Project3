<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MediFlow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card card">
      <div class="auth-logo">
        <h1>MediFlow</h1>
        <p>Sign in to your account</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>
      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Register</a></p>
        <p class="mt-1"><a href="#" onclick="forgotPassword()">Forgot password?</a></p>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const redirectUrl = new URLSearchParams(window.location.search).get('redirect');

    let user = null;
    try {
      user = api.getUser();
    } catch (error) {
      console.warn('Unable to read saved user:', error);
    }

    if (user) {
      if (redirectUrl) {
        if (redirectUrl.includes('/admin/') && user.role !== 'admin') {
          window.location.href = user.role === 'supplier' ? '/pages/supplier/dashboard.html' : 'shop.html';
        } else {
          window.location.href = redirectUrl;
        }
      } else if (user.role === 'admin') {
        window.location.href = '/pages/admin/dashboard.html';
      } else if (user.role === 'supplier') {
        window.location.href = '/pages/supplier/dashboard.html';
      } else {
        window.location.href = 'shop.html';
      }
      return;
    }

    const loginForm = document.getElementById('loginForm');
    if (loginForm) {
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true; btn.textContent = 'Signing in...';
        try {
          const data = await api.post('/api/auth/login', {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          });
          localStorage.setItem('mediflow_token', data.accessToken);
          localStorage.setItem('mediflow_user', JSON.stringify(data.user));
          if (redirectUrl) {
            if (redirectUrl.includes('/admin/') && data.user.role !== 'admin') {
              window.location.href = data.user.role === 'supplier' ? '/pages/supplier/dashboard.html' : 'shop.html';
            } else {
              window.location.href = redirectUrl;
            }
          } else if (data.user.role === 'admin') {
            window.location.href = '/pages/admin/dashboard.html';
          } else if (data.user.role === 'supplier') {
            window.location.href = '/pages/supplier/dashboard.html';
          } else {
            window.location.href = 'shop.html';
          }
        } catch (err) {
          alert(err.message || 'Login failed');
        } finally {
          btn.disabled = false; btn.textContent = 'Sign In';
        }
      });
    }

    async function forgotPassword() {
      const email = prompt('Enter your email:');
      if (!email) return;
      try {
        await api.post('/api/auth/forgot-password', { email });
        alert('OTP sent to your email.');
      } catch (err) {
        alert(err.message || 'Failed to send OTP');
      }
    }
  </script>
</body>

</html>
