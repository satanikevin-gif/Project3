<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - MediFlow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="shop.html" class="navbar-brand">
      <span class="brand-icon">+</span> MediFlow
    </a>
    <div class="nav-links">
      <a href="shop.html">Shop</a>
      <a href="cart.html" class="cart-badge">
        Cart <span class="cart-count" style="display:none">0</span>
      </a>
      <a href="my-orders.html">Orders</a>
      <a href="#" onclick="api.logout()">Logout</a>
    </div>
  </nav>

  <div class="container" style="padding-top:24px">
    <h2 class="mb-3">My Orders</h2>

    <div id="loadingState" class="loading-state">
      <div class="spinner"></div>
      <p>Loading orders...</p>
    </div>
    <div id="emptyState" class="empty-state hidden">
      <h3>No orders yet</h3>
      <p>Place your first order to see it here.</p>
      <a href="shop.html" class="btn btn-primary">Start Shopping</a>
    </div>
    <div id="ordersList"></div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script>
    if (!api.isLoggedIn()) { window.location.href = 'login.html'; return; }
    if (api.isAdmin()) { window.location.href = '/pages/admin/dashboard.html'; return; }

    const statusColors = {
      pending: 'badge-amber',
      confirmed: 'badge-blue',
      packed: 'badge-blue',
      out_for_delivery: 'badge-amber',
      delivered: 'badge-green',
      cancelled: 'badge-red'
    };

    const statusLabels = {
      pending: 'Pending',
      confirmed: 'Confirmed',
      packed: 'Packed',
      out_for_delivery: 'Out for Delivery',
      delivered: 'Delivered',
      cancelled: 'Cancelled'
    };

    async function loadOrders() {
      document.getElementById('loadingState').classList.remove('hidden');
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('ordersList').innerHTML = '';

      try {
        const orders = await api.get('/api/customer/orders/my');

        document.getElementById('loadingState').classList.add('hidden');

        if (orders.length === 0) {
          document.getElementById('emptyState').classList.remove('hidden');
          return;
        }

        document.getElementById('ordersList').innerHTML = orders.map(order => `
          <div class="card mb-2">
            <div class="flex-between mb-2">
              <div>
                <strong>${order.orderNo}</strong>
                <span class="text-muted" style="font-size:13px;margin-left:12px">${new Date(order.createdAt).toLocaleDateString('en-IN')}</span>
              </div>
              <div>
                <span class="badge ${statusColors[order.status] || 'badge-gray'}">${statusLabels[order.status] || order.status}</span>
              </div>
            </div>
            <table>
              <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
              <tbody>
                ${order.items.map(i => `<tr><td>${i.name}</td><td>${i.qty}</td><td>Rs. ${i.mrp}</td><td>Rs. ${i.lineTotal}</td></tr>`).join('')}
              </tbody>
            </table>
            <div class="flex-between mt-2" style="font-size:13px">
              <span class="text-muted">Total: Rs. ${order.totalAmount}</span>
              <a href="order-tracking.html?id=${order._id}" class="btn btn-secondary btn-sm">Track Order</a>
            </div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('ordersList').innerHTML = `<div class="error-state"><h3>Failed to load orders</h3><p>${err.message}</p><button class="btn btn-secondary" onclick="loadOrders()">Retry</button></div>`;
      }
    }

    loadOrders();
  </script>
</body>
</html>
